apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-datasources
  labels:
    {{ include "grafana.labels" . | nindent 4 }}
data:
  datasource.yml: |
    apiVersion: 1

    deleteDatasources:
      - name: Prometheus

    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://kube-prometheus.default.svc.cluster.local:9090
      access: proxy
      isDefault: true
      editable: true
