apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-prometheus.fullname" . }}
  labels:
    {{ include "kube-prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}
    
    scrape_configs:
     - job_name: "source"
       metrics_path: "/actuator/prometheus"
       static_configs:
         - targets: ["source:8080"]
     - job_name: "processor"
       metrics_path: "/actuator/prometheus"
       static_configs:
         - targets: [ "processor:8091" ]
     - job_name: "sink"
       metrics_path: "/actuator/prometheus"
       static_configs:
         - targets: [ "sink:8092" ]
     - job_name: "dlq"
       metrics_path: "/actuator/prometheus"
       static_configs:
         - targets: [ "dlq:8093" ]
     - job_name: "kafka-exporter"
       static_configs:
         - targets: [ "kafka-exporter:9308" ]
